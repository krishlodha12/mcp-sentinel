name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-sentinel/package-lock.json
      - run: npm ci
        working-directory: mcp-sentinel
      - run: npm test
        working-directory: mcp-sentinel
      - run: npm run scan -- fixtures/vulnerable-setup
        working-directory: mcp-sentinel
      - run: npm run scan -- fixtures/real-world/mcp-remote-cve-2025-6514.json
        working-directory: mcp-sentinel
